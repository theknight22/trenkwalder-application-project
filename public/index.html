<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HR Assistant Demo</title>


  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: ui-sans-serif, system-ui, "Segoe UI", sans-serif;
      background: #e1ded8;
      color: #252421;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(800px, 100%);
      height: min(800px, calc(100vh - 48px));
      height: min(800px, calc(100dvh - 48px));
      background: #fffdf8;
      border: 1px solid #d5cbba;
      box-shadow: 0 18px 45px rgba(54, 46, 34, .14);
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header, form { padding: 18px 22px; }
    header { border-bottom: 1px solid #e3dacb; }
    h1 { margin: 0 0 4px; font-size: 22px; }
    header p { margin: 0; color: #6f675b; }

    #chat {
      overflow-y: auto;
      overscroll-behavior: contain;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .message { max-width: 76%; line-height: 1.5; }
    .user { align-self: flex-end; }
    .bot { align-self: flex-start; }
    .bubble {
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid #e2dacd;
      background: #fffaef;
      white-space: pre-wrap;
    }
    .user .bubble { background: #243b37; color: white; border-color: #263f3b; }
    .meta { margin-top: 4px; font-size: 12px; color: #7d7467; }
    .user .meta { text-align: right; }

    .tag {
      display: inline-block;
      margin-left: 6px;
      font-size: 11px;
      color: #5f5548;
    }
    .citations { margin-top: 8px; color: #6f675b; font-size: 13px; }
    .citations div { margin-top: 3px; }

    .welcome {
      color: #6f675b;
      border: 1px dashed #ccbfae;
      padding: 16px;
      background: #faf7ef;
    }
    .examples { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 8px; }
    .examples button {
      border: 1px solid #cfc3b2;
      background: white;
      color: #263f3b;
      padding: 7px 10px;
      cursor: pointer;
    }

    form {
      border-top: 1px solid #e3dacb;
      display: flex;
      gap: 10px;
    }
    input {
      flex: 1;
      padding: 12px;
      border: 1px solid #cfc3b2;
      font: inherit;
    }
    button {
      font: inherit;
      border: 0;
      background: #263f3b;
      color: white;
      padding: 0 18px;
    }
    button:disabled { opacity: .55; }

    @media (max-width: 650px) {
      body { padding: 0; display: block; }
      main { height: 100vh; height: 100dvh; border: 0; }
      .message { max-width: 92%; }
      form { padding: 12px; }
    }
  </style>
</head>


<body>
  <main>
    <header>
      <h1>HR Assistant Demo</h1>
      <p>Answers handbook questions and calls the mock HR balance service when needed.</p>
    </header>

    <section id="chat">
      <div class="welcome" id="welcome">
        Try a policy question or ask for a balance with an employee ID.
        <div class="examples">
          <button type="button">What is the remote work policy?</button>
          <button type="button">How many vacation days left for employee:E001?</button>
          <button type="button">What benefits do employees get?</button>
        </div>
      </div>
    </section>

    <form id="ask-form">
      <input id="question" autocomplete="off" placeholder="Ask something about HR policies..." />
      <button id="send" type="submit">Send</button>
    </form>
  </main>

  <script>
    const chat = document.querySelector("#chat");
    const form = document.querySelector("#ask-form");
    const input = document.querySelector("#question");

    const sendButton = document.querySelector("#send");

    const labels = { static: "policy answer", dynamic: "live HR data", fallback: "not found", error: "error" };
    const isCoarsePointer = window.matchMedia("(pointer: coarse)").matches;

    function addMessage(role, text, data = {}) {

      document.querySelector("#welcome")?.remove();

      const item = document.createElement("article");
      item.className = `message ${role}`;

      const refs = (data.citations || [])
        .map((c) => `<div>${escapeHtml(c.source)} · ${escapeHtml(c.chunkId)} · ${Number(c.score).toFixed(3)}</div>`)
        .join("");
      
      const tag = data.kind ? ` <span class="tag">${labels[data.kind] || data.kind}</span>` : "";

      item.innerHTML = 
      ` <div class="bubble">${escapeHtml(text)}${tag}${refs ? `<div class="citations">${refs}</div>` : ""}</div>
        <div class="meta">${new Date().toLocaleTimeString()}</div>`;
      
      chat.appendChild(item);
      chat.scrollTop = chat.scrollHeight;
    }

    function focusInputWithoutJump() {
    
      if (isCoarsePointer) return;
      try {
        input.focus({ preventScroll: true });
      } catch {
        input.focus();
      }
    }

    async function ask(question) {
    
      addMessage("user", question);
      sendButton.disabled = true;

      try {
        const response = await fetch("/api/chat", {

          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question })
        });

        const data = await response.json().catch(() => ({}));

        addMessage("bot", data.answer || data.error || "Something went wrong.", data);
      } catch {
        addMessage("bot", "Could not reach the server. Is it running?", { kind: "error" });
      } finally {
        sendButton.disabled = false;
        focusInputWithoutJump();
      }
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"]/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[char]));
    }

    form.addEventListener("submit", (event) => {

      event.preventDefault();
      const question = input.value.trim();

      if (!question) return;

      input.value = "";
      ask(question);
    });

    document.querySelectorAll(".examples button").forEach((button) => {

      button.addEventListener("click", () => {
        input.value = button.textContent;
        form.requestSubmit();
      });
    });

    focusInputWithoutJump();
    
  </script>
</body>
</html>
